worker_processes  1;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 256M;

    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    proxy_buffer_size   128k;
    proxy_buffers     4 256k;
    proxy_busy_buffers_size 256k;

    access_log   "C:/WPronto/src/WPLaunchGUI/bin/Debug/net8.0-windows/logs/nginx_access.log";
    error_log    "C:/WPronto/src/WPLaunchGUI/bin/Debug/net8.0-windows/logs/nginx_error.log";

    # Main site
    server {
        listen       80;
        server_name  localhost;
        root         "C:/WPronto/src/WPLaunchGUI/bin/Debug/net8.0-windows/www/default";
        index        index.php index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 600;
            fastcgi_send_timeout 600;
        }
    }

    # phpMyAdmin on separate port
    server {
        listen       8080;
        server_name  localhost;
        root         "C:/WPronto/src/WPLaunchGUI/bin/Debug/net8.0-windows/core/phpmyadmin";
        index        index.php;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 600;
        }
    }

    include "C:/WPronto/src/WPLaunchGUI/bin/Debug/net8.0-windows/config/nginx/sites/*.conf";
}
