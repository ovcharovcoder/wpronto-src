worker_processes  1;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    access_log "C:/WPLaunch/src/WPLaunchGUI/logs/nginx_access.log";
    error_log  "C:/WPLaunch/src/WPLaunchGUI/logs/nginx_error.log";

    server {
        listen       80;
        server_name  localhost;
        root         "C:/WPLaunch/src/WPLaunchGUI/www/default";
        index        index.php index.html;

        location / { try_files $uri $uri/ =404; }

        location /phpmyadmin {
            alias "C:/WPLaunch/src/WPLaunchGUI/core/phpmyadmin/";
            index index.php;
            location ~ \.php$ {
                fastcgi_pass  127.0.0.1:9000;
                fastcgi_param SCRIPT_FILENAME $request_filename;
                include       fastcgi_params;
            }
        }

        location ~ \.php$ {
            try_files     $uri =404;
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include       fastcgi_params;
        }
    }

    include "C:/WPLaunch/src/WPLaunchGUI/config/nginx/sites/*.conf";
}
