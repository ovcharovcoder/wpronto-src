worker_processes  1;

events {
    worker_connections  1024;
}

http {
    server {
        listen 80;
        server_name localhost;
        
        location / {
            root C:/WPLaunch/core/phpmyadmin;
            index test.php;
        }
        
        location ~ \.php$ {
            root C:/WPLaunch/core/phpmyadmin;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME C:/WPLaunch/core/phpmyadmin$fastcgi_script_name;
            include fastcgi_params;
        }
    }
}